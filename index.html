<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Lecture Poll</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 0 auto; padding: 20px; text-align: center; }
        #statusMessage { color: #666; margin-bottom: 20px; font-style: italic; }
        .options-container { display: flex; flex-direction: column; gap: 15px; }
        button.option-btn {
            padding: 15px 20px; font-size: 1.2em; cursor: pointer;
            border: 2px solid #4285F4; border-radius: 8px;
            background: white; color: #4285F4; transition: all 0.2s;
            transition: transform 0.1s;
        }
        button.option-btn:active { transform: scale(0.96); }
        button.option-btn:hover { background: #f0f4ff; }
        button.option-btn.selected { background: #4285F4; color: white; }
        button.option-btn:disabled { border-color: #ccc; color: #999; cursor: not-allowed; background: #f9f9f9; }
        button.option-btn.selected:disabled { background: #a0c1ff; border-color: #a0c1ff; color: white; }
    </style>
</head>
<body>

    <h2>Live Poll</h2>
    <div id="statusMessage">Connecting to the lecture...</div>
    <div id="optionsContainer" class="options-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCRpILPQ5n3PimcVlQTl2g1oJ5zwR2Xing",
            authDomain: "my-live-polling.firebaseapp.com",
            projectId: "my-live-polling",
            storageBucket: "my-live-polling.firebasestorage.app",
            messagingSenderId: "367126138943",
            appId: "1:367126138943:web:857243dd5c68a2f00ce88a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusMessage = document.getElementById('statusMessage');
        const optionsContainer = document.getElementById('optionsContainer');
        
        let currentUser = null;
        let activeQuestionId = null;
        let currentSelection = null;

        let clicksRemaining = 5; // Feeling facetious?

        // 1. Log the student in silently with Error Handling
        signInAnonymously(auth)
            .then(() => {
                // Success - the onAuthStateChanged listener will take it from here
                console.log("Logged in anonymously");
            })
            .catch((error) => {
                console.error("Auth Error:", error.code, error.message);
                
                const statusMessage = document.getElementById('statusMessage');
                
                // Check if we hit the IP registration limit
                if (error.code === 'auth/quota-exceeded' || error.code === 'auth/too-many-requests') {
                    statusMessage.innerHTML = `
                        <div style="background: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-top: 20px; text-align: left;">
                            <strong>⚠️ Connection Limit Reached</strong><br>
                            Too many new users are connecting from the same IP address at once.
                            <br><br>
                            <strong>To fix this:</strong>
                            <ol>
                                <li>Turn <strong>OFF</strong> Wi-Fi on your phone.</li>
                                <li>Refresh this page using your <strong>Cellular Data</strong>.</li>
                                <li>Once logged in, you can turn Wi-Fi back on.</li>
                            </ol>
                        </div>`;
                } else {
                    statusMessage.innerText = "Connection error. Please try refreshing the page.";
                }
            });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                // Register presence
                setDoc(doc(db, "presence", user.uid), { last_seen: serverTimestamp() });
                startListeningToLiveState();
            }
        });

        // 2. Listen to the live state
        function startListeningToLiveState() {
            const liveStateRef = doc(db, "state", "live");
            
            onSnapshot(liveStateRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    handleStateChange(data);
                }
            });
        }

        // 3. Update UI based on what the Admin is doing
        function handleStateChange(data) {
            let isNewQuestionLoad = false;
            
            // Check if the question ID from Firebase is different from our local memory
            if (data.active_question_id !== activeQuestionId) {
                activeQuestionId = data.active_question_id;
                currentSelection = null;
                isNewQuestionLoad = true; 

                // PERSISTENCE: Check if this matches the "active" one in storage
                const savedId = localStorage.getItem('active_poll_id');
                if (savedId === activeQuestionId) {
                    // Same question as before refresh, load the saved clicks
                    clicksRemaining = parseInt(localStorage.getItem('active_poll_clicks')) || 0;
                } else {
                    // Brand new question or first time seeing this ID
                    clicksRemaining = 5;
                    localStorage.setItem('active_poll_id', activeQuestionId);
                    localStorage.setItem('active_poll_clicks', clicksRemaining);
                }
            }

            optionsContainer.innerHTML = ''; 

            if (data.status === "open") {
                updateStatusUI(); // Use the helper to show clicks remaining
            } else {
                statusMessage.innerText = "Polling is currently closed.";
            }

            data.options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = optionText;
                
                if (data.status === "closed") {
                    btn.disabled = true;
                } else {
                    btn.onclick = () => submitAnswer(optionText, btn);
                }

                if (currentSelection === optionText) btn.classList.add('selected');
                optionsContainer.appendChild(btn);
            });

            if (isNewQuestionLoad) {
                restorePreviousAnswer(activeQuestionId);
            }
        }

        // 4. Send the vote (or delete it)
        async function submitAnswer(selectedOption, clickedButton) {
            if (!currentUser || !activeQuestionId) return;

            // Check if they are out of moves
            if (clicksRemaining <= 0 && currentSelection !== selectedOption) {
                statusMessage.innerHTML = "<span style='color: #EA4335;'>No more changes allowed for this question.</span>";
                return;
            }

            const isChange = (currentSelection !== selectedOption);
            const answerRef = doc(db, "questions", activeQuestionId, "answers", currentUser.uid);

            try {
                if (currentSelection === selectedOption) {
                    // Unchecking an answer
                    currentSelection = null;
                    clickedButton.classList.remove('selected');
                    await deleteDoc(answerRef);
                } else {
                    // Selecting/Changing an answer
                    currentSelection = selectedOption;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    clickedButton.classList.add('selected');
                    await setDoc(answerRef, { choice: selectedOption, timestamp: serverTimestamp() });
                }

                // Only decrement if they actually changed their mind or made a new choice
                if (isChange) {
                    clicksRemaining--;
                    localStorage.setItem('active_poll_clicks', clicksRemaining);
                }
                updateStatusUI();

            } catch (error) {
                console.error("Error:", error);
                statusMessage.innerText = "Connection error. Please tap again.";
            }
        }

        function updateStatusUI() {
            if (clicksRemaining > 0) {
                if (clicksRemaining <= 3) {
                    const timesText = clicksRemaining === 1 ? "time" : "times";
                    statusMessage.innerText = `You can change your answer ${clicksRemaining} more ${timesText}.`;   
                }
            } else {
                statusMessage.innerText = "Final answer locked in.";
            }
        }

        // 5. Check if the user already answered this question (for page reloads)
        async function restorePreviousAnswer(questionId) {
            if (!currentUser || !questionId) return;

            try {
                const answerRef = doc(db, "questions", questionId, "answers", currentUser.uid);
                const docSnap = await getDoc(answerRef);

                // If they have an answer on record, and the question hasn't changed while loading:
                if (docSnap.exists() && activeQuestionId === questionId) {
                    currentSelection = docSnap.data().choice;

                    // Find the matching button and add the 'selected' class
                    document.querySelectorAll('.option-btn').forEach(btn => {
                        if (btn.innerText === currentSelection) {
                            btn.classList.add('selected');
                        }
                    });
                }
            } catch (error) {
                console.error("Error fetching previous answer:", error);
            }
        }
    </script>
</body>
</html>
