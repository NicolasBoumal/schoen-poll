<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Schoen Poll - Results</title>

    <!-- Include all three of these on your webpage.
         It's ok to hotlink the js and css files to where they are hosted. -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script type="module" src="schoen-poll.js"></script>
    <link rel="stylesheet" type="text/css" href="schoen-poll.css">

    <!-- These are just for the favicon, can be omitted. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

</head>
<body>

    <!-- Then also include these lines anywhere on your webpage.
         It's hidden by default: the Admin remote toggles reveal/hide. -->
    <div id="schoenPollLoginSection">
        <button id="spLoginBtn">Schoen Poll Login</button>
        <div id="spAuthMessage"></div>
    </div>
    <div id="schoenPollOverlay">
        <svg id="spChart"></svg>
    </div>
    <div id="schoenPollQRContainer" class="hidden">
        <div class="spQRCard">
            <img id="spQRimage" src="" alt="Scan to join">
            <p>Scan to join the poll! Or go to:</p>
            <code id="spQRurl"></code>
        </div>
    </div>

</body>
</html>
