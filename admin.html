<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lecture Poll - Admin</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .panel { border: 1px solid #ccc; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .hidden { display: none; }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; color: white;}
        #loginBtn { background: #4285F4; }
        #launchBtn { background: #4285F4; width: 100%; margin-bottom: 20px;}
    </style>
</head>
<body>

    <h2>Admin Control Panel</h2>
    
    <div id="loginSection">
        <p>Please log in with your authorized Google account.</p>
        <button id="loginBtn">Log in with Google</button>
    </div>

    <div id="adminSection" class="panel hidden">
        
        <div style="display: flex; justify-content: space-between; align-items: center; background: #f0f4ff; padding: 10px 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #d2e3fc;">
            <span id="userEmailDisplay" style="font-weight: bold; color: #4285F4; font-size: 0.9em;"></span>
            <div>
                <button id="resetPresenceBtn" style="background: #FBBC05; color: black; padding: 6px 12px; font-size: 0.8em; margin-right: 5px;">Reset Presence</button>
                <button id="logoutBtn" style="background: #EA4335; padding: 6px 12px; font-size: 0.8em;">Log Out</button>
            </div>
        </div>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 20px; text-align: center; font-weight: bold; border: 1px solid #e9ecef;">
            👥 Connected Students: <span id="studentCount" style="color: #4285F4;">0</span> &nbsp;|&nbsp;
            🗳️ Votes Cast: <span id="voteCount" style="color: #34A853;">0</span>
        </div>

        <h3>Launch a Question</h3>
        <label for="optionsInput">Comma-separated options:</label>
        <input type="text" id="optionsInput" value="Yes, No">
        
        <button id="launchBtn">Launch New Question</button>

        <button id="simulateBtn" style="background: #6c757d; margin-top: 10px; width: 100%;">Simulate 100 Random Votes</button>
        
        <hr style="margin: 20px 0;">
        
        <div style="display: flex; gap: 10px;">
            <button id="toggleStatusBtn" style="flex: 1; background: #666;">Close Poll</button>
            <button id="revealBtn" style="flex: 1; background: #FBBC05; color: black;">Reveal Answers</button>
        </div>
        <p id="statusText" style="color: #666; font-size: 0.9em; margin-top: 15px;"></p>
    </div>

    <script type="module">
        // 1. All necessary Firebase imports
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 2. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCRpILPQ5n3PimcVlQTl2g1oJ5zwR2Xing",
            authDomain: "my-live-polling.firebaseapp.com",
            projectId: "my-live-polling",
            storageBucket: "my-live-polling.firebasestorage.app",
            messagingSenderId: "367126138943",
            appId: "1:367126138943:web:857243dd5c68a2f00ce88a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3. UI Elements
        const loginSection = document.getElementById('loginSection');
        const adminSection = document.getElementById('adminSection');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        const statusText = document.getElementById('statusText');

        // 4. State Variables
        let currentLiveState = {};
        let unsubscribeAnswers = null;
        let unsubscribePresence = null;
        let unsubscribeLiveState = null;
        
        // The global Set for tracking distinct users
        let seenUserIds = new Set();

        function updateStudentCountUI() {
            document.getElementById('studentCount').innerText = seenUserIds.size;
        }

        // 5. Authentication Logic
        document.getElementById('loginBtn').addEventListener('click', () => {
            signInWithPopup(auth, new GoogleAuthProvider()).catch(error => alert(error.message));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).catch((error) => console.error("Logout error:", error));
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userEmailDisplay.innerText = `Admin: ${user.email}`;
                loginSection.classList.add('hidden');
                adminSection.classList.remove('hidden');
                
                setupAdminListeners(); 
            } else {
                loginSection.classList.remove('hidden');
                adminSection.classList.add('hidden');
                
                cleanupListeners(); 
            }
        });

        // 6. Database Listeners
        function setupAdminListeners() {
            // Simple listener for presence. Adds any document ID to our Set.
            unsubscribePresence = onSnapshot(collection(db, "presence"), (snapshot) => {
                snapshot.forEach(doc => {
                    seenUserIds.add(doc.id);
                });
                updateStudentCountUI();
            });

            // Listen to live state (Traffic Controller)
            unsubscribeLiveState = onSnapshot(doc(db, "state", "live"), (docSnap) => {
                if (docSnap.exists()) {
                    currentLiveState = docSnap.data();
                    
                    // Sync Open/Close Button
                    const toggleBtn = document.getElementById('toggleStatusBtn');
                    if (currentLiveState.status === "open") {
                        toggleBtn.innerText = "Close Poll";
                        toggleBtn.style.background = "#EA4335"; // Red
                    } else {
                        toggleBtn.innerText = "Re-open Poll";
                        toggleBtn.style.background = "#34A853"; // Green
                    }

                    // Sync Reveal Button
                    const revealBtn = document.getElementById('revealBtn');
                    if (currentLiveState.reveal) {
                        revealBtn.innerText = "Hide Answers";
                        revealBtn.style.opacity = "0.5";
                    } else {
                        revealBtn.innerText = "Reveal Answers";
                        revealBtn.style.opacity = "1";
                    }

                    // Keep vote count updated for the active question
                    if (currentLiveState.active_question_id) {
                        listenToAdminVotes(currentLiveState.active_question_id);
                    }
                }
            });
        }

        function cleanupListeners() {
            if (unsubscribePresence) unsubscribePresence();
            if (unsubscribeLiveState) unsubscribeLiveState();
            if (unsubscribeAnswers) unsubscribeAnswers();
        }

        // Count votes for the admin UI
        function listenToAdminVotes(questionId) {
            if (unsubscribeAnswers) unsubscribeAnswers();
            unsubscribeAnswers = onSnapshot(collection(db, "questions", questionId, "answers"), (snapshot) => {
                document.getElementById('voteCount').innerText = snapshot.size;
                
                // Every person who answers is also added to the set of (distinct) active users
                snapshot.forEach(doc => {
                    seenUserIds.add(doc.id);
                });
                updateStudentCountUI();
            });
        }

        // 7. Button Actions

        // Reset Presence Button
        document.getElementById('resetPresenceBtn').addEventListener('click', async () => {
            // if (!confirm("Are you sure you want to reset the active user count? This will wipe the presence records.")) return;
            
            statusText.innerText = "Resetting presence...";

            try {
                // 1. Fetch and delete all documents in the presence collection
                const presenceSnap = await getDocs(collection(db, "presence"));
                const deletePromises = [];
                presenceSnap.forEach(d => {
                    deletePromises.push(deleteDoc(d.ref));
                });
                await Promise.all(deletePromises);
                
                // 2. Clear the local distinct list
                seenUserIds.clear();
                
                // 3. Intelligently preserve anyone who currently has a vote cast for the active question
                if (currentLiveState.active_question_id) {
                    const ansSnap = await getDocs(collection(db, "questions", currentLiveState.active_question_id, "answers"));
                    ansSnap.forEach(d => seenUserIds.add(d.id));
                }
                
                updateStudentCountUI();
                statusText.innerText = "Presence reset successfully.";
                setTimeout(() => statusText.innerText = "", 3000);
            } catch (error) {
                console.error("Error resetting presence:", error);
                statusText.innerText = "Error resetting presence.";
            }
        });

        // Launch Question
        document.getElementById('launchBtn').addEventListener('click', async () => {
            const optionsRaw = document.getElementById('optionsInput').value;
            const optionsArray = optionsRaw.split(',').map(o => o.trim()).filter(o => o.length > 0);

            if (optionsArray.length === 0) return alert("Please provide at least one option.");

            try {
                const questionRef = await addDoc(collection(db, "questions"), {
                    timestamp: serverTimestamp(),
                    options: optionsArray
                });

                // Include user_count in the payload
                await setDoc(doc(db, "state", "live"), {
                    active_question_id: questionRef.id,
                    status: "open",
                    reveal: false, // If "false" then, by default, when a new question is launched, results are hidden.
                    options: optionsArray,
                    user_count: seenUserIds.size
                });

                statusText.innerText = "New question launched.";
                setTimeout(() => statusText.innerText = "", 3000);
            } catch (error) {
                console.error("Error launching:", error);
                alert("Failed to launch. Check console.");
            }
        });

        // Toggle Open/Closed Status
        document.getElementById('toggleStatusBtn').addEventListener('click', async () => {
            if (!currentLiveState.active_question_id) return; // Prevent clicking before launch
            const newStatus = currentLiveState.status === "open" ? "closed" : "open";
            
            // Include user_count in the payload
            await setDoc(doc(db, "state", "live"), { 
                status: newStatus,
                user_count: seenUserIds.size
            }, { merge: true });
        });

        // Toggle Reveal Status
        document.getElementById('revealBtn').addEventListener('click', async () => {
            if (!currentLiveState.active_question_id) return;
            const newReveal = !currentLiveState.reveal;
            
            // Include user_count in the payload
            await setDoc(doc(db, "state", "live"), { 
                reveal: newReveal,
                user_count: seenUserIds.size
            }, { merge: true });
        });

        // Simulation button
        document.getElementById('simulateBtn').addEventListener('click', () => {
            if (!currentLiveState || !currentLiveState.active_question_id) {
                alert("Launch a question first!");
                return;
            }

            const questionId = currentLiveState.active_question_id;
            const options = currentLiveState.options;
            let votesSent = 0;
            const totalToSimulate = 100;

            statusText.innerText = "Simulating organic traffic...";

            function sendNextVote() {
                if (votesSent >= totalToSimulate) {
                    statusText.innerText = "Simulation complete.";
                    return;
                }

                const randomOption = options[Math.floor(Math.random() * options.length)];
                const fakeUserId = "sim_" + Math.random().toString(36).substring(2, 10);
                const answerRef = doc(db, "questions", questionId, "answers", fakeUserId);

                setDoc(answerRef, {
                    choice: randomOption,
                    timestamp: serverTimestamp(),
                    isSimulated: true
                }).then(() => {
                    votesSent++;
                    const nextDelay = Math.floor(Math.random() * 100) + 10;
                    setTimeout(sendNextVote, nextDelay);
                }).catch(e => {
                    console.error("Sim error:", e);
                });
            }

            sendNextVote();
        });

    </script>
</body>
</html>
